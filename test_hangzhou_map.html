<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TravAgent - 杭州旅行地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 16px; text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 10px 0 0 0; opacity: 0.9; }
        .map-container { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        #map { width: 100%; height: 500px; border-radius: 12px; }
        .legend { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .legend h3 { margin: 0 0 15px 0; color: #2c3e50; font-size: 18px; }
        .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .legend-item { display: flex; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .legend-item:hover, .legend-item.active { background: #e8f4fd; }
        .legend-color { width: 24px; height: 4px; border-radius: 2px; margin-right: 10px; }
        .legend-day { font-weight: bold; color: #2c3e50; }
        .legend-attractions { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
        .transport-section { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 20px; }
        .transport-section h3 { margin: 0 0 15px 0; color: #2c3e50; font-size: 18px; }
        .day-transport { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; opacity: 0.7; transition: opacity 0.3s; }
        .day-transport.active { opacity: 1; }
        .day-transport:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .day-header { display: flex; align-items: center; margin-bottom: 12px; }
        .day-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin-right: 12px; }
        .day-title { font-weight: bold; color: #2c3e50; }
        .transport-card { display: flex; align-items: center; padding: 12px 15px; background: #f8f9fa; border-radius: 10px; margin: 8px 0; cursor: pointer; transition: all 0.3s; border-left: 4px solid transparent; }
        .transport-card:hover, .transport-card.active { background: #e8f4fd; transform: translateX(5px); }
        .transport-icon { font-size: 28px; margin-right: 15px; }
        .transport-info { flex: 1; }
        .transport-name { font-weight: bold; color: #2c3e50; }
        .transport-details { font-size: 13px; color: #7f8c8d; }
        .transport-cost { font-weight: bold; color: #3498db; }
        .map-controls { margin-bottom: 15px; display: flex; gap: 10px; }
        .control-btn { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .control-btn:hover { background: #5a6fd6; }
        .control-btn.active { background: #2ecc71; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ 杭州旅行路线地图</h1>
            <p>共3天行程 · 点击图例或交通卡片高亮对应路线</p>
        </div>
        
        <div class="map-container">
            <div class="map-controls">
                <button class="control-btn active" onclick="showAllRoutes()">显示全部路线</button>
                <button class="control-btn" onclick="clearHighlight()">清除高亮</button>
            </div>
            <div id="map"></div>
        </div>
        
        <div class="legend">
            <h3>📅 每日路线图例</h3>
            <div class="legend-grid">
                <div class="legend-item" onclick="toggleDay(1)"><div class="legend-color" style="background:#3498db"></div><div><div class="legend-day">Day 1</div><div class="legend-attractions">西湖, 灵隐寺</div></div></div><div class="legend-item" onclick="toggleDay(2)"><div class="legend-color" style="background:#e74c3c"></div><div><div class="legend-day">Day 2</div><div class="legend-attractions">雷峰塔, 西溪湿地</div></div></div><div class="legend-item" onclick="toggleDay(3)"><div class="legend-color" style="background:#2ecc71"></div><div><div class="legend-day">Day 3</div><div class="legend-attractions">宋城</div></div></div>
            </div>
        </div>
        
        <div class="transport-section">
            <h3>🚗 交通方式详情</h3>
            <div class="day-transport" id="transport-day-1"><div class="day-header"><div class="day-badge" style="background:#3498db">1</div><div class="day-title">第1天路线</div></div><div class="transport-card" onclick="toggleDay(1)"><span class="transport-icon">🚇</span><div class="transport-info"><div class="transport-name">地铁</div><div class="transport-details">西湖 → 灵隐寺 · 约3分钟</div></div><div class="transport-cost">¥5</div></div></div><div class="day-transport" id="transport-day-2"><div class="day-header"><div class="day-badge" style="background:#e74c3c">2</div><div class="day-title">第2天路线</div></div><div class="transport-card" onclick="toggleDay(2)"><span class="transport-icon">🚇</span><div class="transport-info"><div class="transport-name">地铁</div><div class="transport-details">雷峰塔 → 西溪湿地 · 约5分钟</div></div><div class="transport-cost">¥6</div></div></div><div class="day-transport" id="transport-day-3"><div class="day-header"><div class="day-badge" style="background:#2ecc71">3</div><div class="day-title">第3天路线</div></div><p style="color:#95a5a6; text-align:center; padding:10px;">当日景点间步行可达</p></div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var routes = [{"day": 1, "color": {"line": "#3498db", "marker": "#2980b9"}, "points": [{"name": "西湖", "index": 1, "coord": [120.1552, 30.2741]}, {"name": "灵隐寺", "index": 2, "coord": [120.1416, 30.2964]}], "transports": [{"from": "西湖", "to": "灵隐寺", "name": "地铁", "icon": "🚇", "time": 3, "cost": 5}]}, {"day": 2, "color": {"line": "#e74c3c", "marker": "#c0392b"}, "points": [{"name": "雷峰塔", "index": 1, "coord": [120.1618, 30.2337]}, {"name": "西溪湿地", "index": 2, "coord": [120.0895, 30.2882]}], "transports": [{"from": "雷峰塔", "to": "西溪湿地", "name": "地铁", "icon": "🚇", "time": 5, "cost": 6}]}, {"day": 3, "color": {"line": "#2ecc71", "marker": "#27ae60"}, "points": [{"name": "宋城", "index": 1, "coord": [120.1093, 30.1987]}], "transports": []}];
        var map;
        var markers = [];
        var polylines = [];
        var highlightedDay = null;
        
        var attractionCoords = {
            '西湖': [30.2741, 120.1552],
            '灵隐寺': [30.2964, 120.1416],
            '雷峰塔': [30.2337, 120.1618],
            '西溪湿地': [30.2882, 120.0895],
            '宋城': [30.1987, 120.1093],
            '八大关': [36.0671, 120.3380],
            '崂山': [36.1503, 120.6649],
            '栈桥': [36.0611, 120.3139],
            '五四广场': [36.0468, 120.3566],
            '极地海洋世界': [36.0427, 120.3860],
            '兵马俑': [34.3802, 109.2755],
            '大雁塔': [34.2252, 108.9516],
            '城墙': [34.2646, 108.9465],
            '陕西历史博物馆': [34.2341, 108.9408],
            '回民街': [34.2707, 108.9481],
            '武汉大学': [30.5431, 114.3618],
            '东湖': [30.5552, 114.3736],
            '黄鹤楼': [30.5515, 114.3054],
            '户部巷': [30.5490, 114.3072],
            '湖北省博物馆': [30.5597, 114.3647],
            '北京故宫': [39.9087, 116.3974],
            '天安门': [39.9042, 116.4066],
            '八达岭长城': [40.3439, 115.9803],
            '颐和园': [39.9999, 116.2755],
            '天坛': [39.8822, 116.4003],
            '上海外滩': [31.2397, 121.4998],
            '东方明珠': [31.2401, 121.5064],
            '豫园': [31.2333, 121.4959],
            '南京路': [31.2398, 121.4899],
            '陆家嘴': [31.2397, 121.5148]
        };
        
        function initMap() {
            map = L.map('map').setView([30.247549999999997, 120.12565000000001], 14);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            
            L.control.scale().addTo(map);
            drawRoutes();
        }
        
        function drawRoutes() {
            routes.forEach(function(route) {
                var points = [];
                var hasCoords = true;
                
                route.points.forEach(function(point) {
                    var coord = attractionCoords[point.name];
                    if (coord) {
                        points.push(coord);
                    } else {
                        hasCoords = false;
                    }
                });
                
                if (points.length >= 2 && hasCoords) {
                    var polyline = L.polyline(points, {
                        color: route.color.line,
                        weight: 6,
                        opacity: 0.8,
                        day: route.day
                    }).addTo(map);
                    
                    polyline.on('click', function(e) {
                        toggleDay(route.day);
                        showRoutePopup(e.latlng, route);
                    });
                    polylines.push(polyline);
                    
                    points.forEach(function(point, idx) {
                        var marker = L.marker(point, {
                            icon: createMarkerIcon(route.color.line, idx + 1),
                            day: route.day,
                            pointName: route.points[idx].name
                        }).addTo(map);
                        
                        marker.bindPopup('<strong>Day ' + route.day + '</strong><br/>' + route.points[idx].name);
                        markers.push(marker);
                    });
                } else if (points.length === 1 && hasCoords) {
                    var marker = L.marker(points[0], {
                        icon: createMarkerIcon(route.color.line, 1),
                        day: route.day,
                        pointName: route.points[0].name
                    }).addTo(map);
                    
                    marker.bindPopup('<strong>Day ' + route.day + '</strong><br/>' + route.points[0].name);
                    markers.push(marker);
                }
            });
        }
        
        function createMarkerIcon(color, number) {
            var svgContent = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36">' +
                '<circle cx="18" cy="18" r="16" fill="' + color + '" stroke="white" stroke-width="3"/>' +
                '<text x="18" y="22" text-anchor="middle" fill="white" font-size="14" font-weight="bold">' + number + '</text>' +
                '</svg>';
            return L.divIcon({
                html: svgContent,
                className: 'custom-marker',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });
        }
        
        function toggleDay(day) {
            if (highlightedDay === day) {
                showAllRoutes();
                highlightedDay = null;
            } else {
                highlightedDay = day;
                
                polylines.forEach(function(polyline) {
                    if (polyline.options.day === day) {
                        polyline.setStyle({weight: 10, opacity: 1});
                        polyline.bringToFront();
                    } else {
                        polyline.setStyle({weight: 4, opacity: 0.2});
                    }
                });
                
                markers.forEach(function(marker) {
                    if (marker.options.day === day) {
                        marker.setOpacity(1);
                        marker.bringToFront();
                    } else {
                        marker.setOpacity(0.3);
                    }
                });
                
                document.querySelectorAll('.day-transport').forEach(function(el) {
                    el.classList.remove('active');
                });
                document.querySelectorAll('.legend-item').forEach(function(el) {
                    el.classList.remove('active');
                });
                
                var transportDay = document.getElementById('transport-day-' + day);
                if (transportDay) {
                    transportDay.classList.add('active');
                }
                
                document.querySelectorAll('.legend-item').forEach(function(el) {
                    if (el.getAttribute('onclick') && el.getAttribute('onclick').includes('toggleDay(' + day + ')')) {
                        el.classList.add('active');
                    }
                });
            }
        }
        
        function showAllRoutes() {
            highlightedDay = null;
            
            polylines.forEach(function(polyline) {
                polyline.setStyle({weight: 6, opacity: 0.8});
            });
            
            markers.forEach(function(marker) {
                marker.setOpacity(1);
            });
            
            document.querySelectorAll('.day-transport').forEach(function(el) {
                el.style.opacity = '0.7';
                el.classList.remove('active');
            });
            document.querySelectorAll('.legend-item').forEach(function(el) {
                el.classList.remove('active');
            });
        }
        
        function clearHighlight() {
            showAllRoutes();
        }
        
        function showRoutePopup(latlng, route) {
            var pointsHtml = '<ul style="margin:0; padding-left:20px;">';
            route.points.forEach(function(point, idx) {
                pointsHtml += '<li><strong>' + (idx + 1) + '. ' + point.name + '</strong></li>';
            });
            pointsHtml += '</ul>';
            
            var transportHtml = '<div style="margin-top:8px; padding-top:8px; border-top:1px solid #eee;">';
            if (route.transports && route.transports.length > 0) {
                transportHtml += '<strong>交通方式：</strong><br/>';
                route.transports.forEach(function(t) {
                    transportHtml += t.icon + ' ' + t.name + ': ' + t.from + ' → ' + t.to + ' · 约' + t.time + '分钟<br/>';
                });
            } else {
                transportHtml += '<strong>交通方式：</strong>步行可达';
            }
            transportHtml += '</div>';
            
            var popupContent = '<div style="min-width:200px;">' +
                '<h4 style="margin:0 0 8px 0; color:#2c3e50;">Day ' + route.day + ' 路线详情</h4>' +
                '<div style="color:#7f8c8d;">途经景点：</div>' +
                pointsHtml +
                transportHtml +
                '</div>';
            
            L.popup({
                maxWidth: 300,
                closeButton: true,
                autoClose: false,
                closeOnClick: false
            })
            .setLatLng(latlng)
            .setContent(popupContent)
            .openOn(map);
        }
        
        window.onload = function() {
            initMap();
        };
    </script>
</body>
</html>
